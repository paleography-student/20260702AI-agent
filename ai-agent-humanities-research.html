<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI智能体实战：文科生如何用AI辅助研究</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Noto+Serif+SC:wght@500;700;900&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===========================================
       CSS CUSTOM PROPERTIES: PAPER AND INK THEME
       修改这里可以统一调整整套课件的纸张、字体和强调色。
       =========================================== */
    :root {
      --stage-bg: #141312;
      --slide-bg: #f7f1e5;
      --paper: #f7f1e5;
      --paper-soft: #fbf7ee;
      --ink: #161310;
      --ink-muted: #5a5045;
      --ink-faint: #8a7c6d;
      --accent: #8d2b2f;
      --accent-soft: #d9b59c;
      --line: rgba(22, 19, 16, .16);
      --font-display: "Noto Serif SC", "Cormorant Garamond", serif;
      --font-body: "Source Serif 4", "Noto Serif SC", serif;
      --ease-out-expo: cubic-bezier(.16, 1, .3, 1);
      --duration-normal: .65s;
    }

    /* ===========================================
       BASE RESET
       让所有元素按固定舞台尺寸排版，避免默认间距造成溢出。
       =========================================== */
    * {
      box-sizing: border-box;
    }

    h1, h2, h3, p {
      margin: 0;
    }

    button {
      font: inherit;
    }

    /* ===========================================
       FIXED 16:9 STAGE: MANDATORY BASE STYLES
       Include this ENTIRE file in every presentation.
       Slides are authored at 1920×1080 and scaled as a whole.
       =========================================== */

    /* 1. Lock the browser viewport */
    html,
    body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--stage-bg, #000);
    }

    /* 2. Full-window deck viewport */
    .deck-viewport {
        position: fixed;
        inset: 0;
        overflow: hidden;
        background: var(--stage-bg, #000);
    }

    /* 3. Fixed 16:9 design canvas.
       JavaScript sets transform: translate(...) scale(...). */
    .deck-stage {
        position: absolute;
        left: 0;
        top: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        transform-origin: 0 0;
        background: var(--slide-bg, #fff);
    }

    /* 4. Slides stack inside the fixed stage.
       Content must be laid out at 1920×1080, not reflowed per device. */
    .slide {
        position: absolute;
        inset: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        display: block;
        visibility: hidden;
        opacity: 0;
        pointer-events: none;
        background: var(--slide-bg, #fff);
    }

    .slide.active,
    .slide.visible {
        visibility: visible;
        opacity: 1;
        pointer-events: auto;
        z-index: 1;
    }

    /* 5. Keep media inside authored slide bounds */
    img,
    video,
    canvas,
    svg {
        max-width: 100%;
        max-height: 100%;
    }

    /* 6. Presentation chrome stays outside the slide design system */
    .deck-controls {
        position: fixed;
        left: 50%;
        bottom: 22px;
        transform: translateX(-50%);
        z-index: 1000;
    }

    /* 7. Print one fixed-size slide per page */
    @media print {
        html,
        body {
            width: 1920px;
            height: auto;
            overflow: visible;
            background: #fff;
        }

        .deck-viewport {
            position: static;
            overflow: visible;
            background: #fff;
        }

        .deck-stage {
            position: static;
            width: auto;
            height: auto;
            transform: none !important;
            background: none;
        }

        .slide {
            position: relative;
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
            pointer-events: auto !important;
            width: 1920px;
            height: 1080px;
            break-after: page;
            page-break-after: always;
        }

        .slide:last-child {
            break-after: auto;
            page-break-after: auto;
        }

        .deck-controls {
            display: none !important;
        }
    }

    /* 8. Reduced motion */
    @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
            animation-duration: 0.01ms !important;
            transition-duration: 0.2s !important;
        }
    }

    /* ===========================================
       PAPER SURFACE AND COMMON SLIDE CHROME
       每页都像同一本讲义里的固定版面，标题和页码位置保持稳定。
       =========================================== */
    body {
      font-family: var(--font-body);
      color: var(--ink);
    }

    .slide {
      background:
        linear-gradient(90deg, rgba(22, 19, 16, .045) 0 1px, transparent 1px),
        repeating-linear-gradient(0deg, rgba(22, 19, 16, .018) 0 1px, transparent 1px 6px),
        var(--paper);
      background-size: 44px 44px, auto, auto;
    }

    .slide::before {
      content: "";
      position: absolute;
      inset: 56px;
      border: 2px solid var(--line);
      pointer-events: none;
    }

    .slide::after {
      content: "";
      position: absolute;
      left: 110px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: rgba(141, 43, 47, .16);
      pointer-events: none;
    }

    .page-no {
      position: absolute;
      top: 96px;
      right: 116px;
      font-size: 26px;
      letter-spacing: .08em;
      color: var(--accent);
      z-index: 2;
    }

    .section-mark {
      position: absolute;
      left: 140px;
      top: 96px;
      font-size: 25px;
      letter-spacing: .14em;
      color: var(--accent);
      z-index: 2;
    }

    .section-mark::after {
      content: "";
      display: block;
      width: 260px;
      height: 4px;
      margin-top: 18px;
      background: var(--accent);
      transform-origin: left center;
      transform: scaleX(0);
      transition: transform .7s var(--ease-out-expo);
    }

    .visible .section-mark::after {
      transform: scaleX(1);
    }

    .slide-inner {
      position: absolute;
      left: 190px;
      right: 150px;
      top: 170px;
      bottom: 105px;
      z-index: 1;
    }

    .title-slide .slide-inner {
      top: 250px;
      left: 190px;
      right: 230px;
      bottom: 190px;
    }

    /* ===========================================
       TYPOGRAPHY
       低密度演讲型页面：大标题、短句、少量要点。
       =========================================== */
    .kicker {
      font-size: 34px;
      letter-spacing: .18em;
      color: #6d5943;
      margin-bottom: 42px;
    }

    h1 {
      font-family: var(--font-display);
      font-size: 124px;
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: 0;
      max-width: 1320px;
    }

    h2 {
      font-family: var(--font-display);
      font-size: 82px;
      line-height: 1.15;
      font-weight: 900;
      letter-spacing: 0;
      max-width: 1320px;
    }

    h3 {
      font-family: var(--font-display);
      font-size: 38px;
      line-height: 1.25;
      font-weight: 800;
    }

    .lead {
      margin-top: 34px;
      font-size: 39px;
      line-height: 1.46;
      color: var(--ink-muted);
      max-width: 1130px;
    }

    .subtitle {
      margin-top: 54px;
      font-size: 40px;
      line-height: 1.45;
      color: #4b4138;
      max-width: 1050px;
    }

    .caption {
      font-size: 26px;
      line-height: 1.45;
      color: var(--ink-faint);
    }

    strong {
      color: var(--accent);
      font-weight: 800;
    }

    /* ===========================================
       LAYOUT COMPONENTS
       多种版式共享同一纸本风格，用于时间轴、表格、流程图和案例页。
       =========================================== */
    .cols {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 44px;
      margin-top: 52px;
      max-width: 1400px;
    }

    .cols.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .cols.row4 {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
      margin-top: 30px;
      max-width: 1450px;
    }

    .card {
      border: 2px solid var(--line);
      background: rgba(255, 255, 255, .28);
      padding: 34px 38px;
      min-height: 170px;
    }

    .card p {
      margin-top: 16px;
      font-size: 29px;
      line-height: 1.45;
      color: var(--ink-muted);
    }

    .cols.row4 .card {
      min-height: 170px;
      padding: 26px 26px;
    }

    .cols.row4 .card h3 {
      font-size: 32px;
    }

    .cols.row4 .card p {
      font-size: 24px;
      line-height: 1.32;
    }

    .big-quote {
      margin-top: 70px;
      max-width: 1220px;
      font-family: var(--font-display);
      font-size: 68px;
      line-height: 1.22;
      color: var(--ink);
    }

    .bullets {
      display: grid;
      gap: 24px;
      margin-top: 52px;
      max-width: 1180px;
      padding: 0;
      list-style: none;
    }

    .bullets li {
      position: relative;
      padding-left: 46px;
      font-size: 36px;
      line-height: 1.38;
      color: var(--ink-muted);
    }

    .bullets li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 22px;
      width: 18px;
      height: 18px;
      border: 4px solid var(--accent);
      border-radius: 50%;
    }

    .small-list li {
      font-size: 30px;
    }

    .timeline {
      margin-top: 58px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 22px;
      max-width: 1440px;
    }

    .time-item {
      min-height: 230px;
      border-top: 8px solid var(--accent);
      padding: 26px 26px 20px;
      background: rgba(255, 255, 255, .24);
      border-left: 2px solid var(--line);
    }

    .time-item .year {
      font-size: 35px;
      color: var(--accent);
      font-weight: 800;
    }

    .time-item p {
      margin-top: 18px;
      font-size: 28px;
      line-height: 1.38;
      color: var(--ink-muted);
    }

    .timeline:has(.time-item:nth-child(5)) {
      margin-top: 44px;
    }

    .timeline:has(.time-item:nth-child(5)) .time-item {
      min-height: 205px;
      padding: 22px 22px 18px;
    }

    .timeline:has(.time-item:nth-child(5)) .time-item .year {
      font-size: 31px;
    }

    .timeline:has(.time-item:nth-child(5)) .time-item p {
      font-size: 24px;
      line-height: 1.32;
    }

    .compare {
      margin-top: 54px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 34px;
      max-width: 1360px;
    }

    .compare-panel {
      border: 2px solid var(--line);
      padding: 42px;
      min-height: 470px;
      background: rgba(255, 255, 255, .24);
    }

    .compare-panel h3 {
      color: var(--accent);
      margin-bottom: 24px;
    }

    .compare-panel p {
      font-size: 31px;
      line-height: 1.48;
      color: var(--ink-muted);
      margin-bottom: 20px;
    }

    .flow {
      margin-top: 60px;
      display: flex;
      align-items: stretch;
      gap: 22px;
      max-width: 1450px;
    }

    .flow-step {
      flex: 1;
      border: 2px solid var(--line);
      background: rgba(255, 255, 255, .25);
      padding: 30px 24px;
      min-height: 210px;
      position: relative;
    }

    .flow-step:not(:last-child)::after {
      content: "";
      position: absolute;
      right: -22px;
      top: 50%;
      width: 22px;
      height: 3px;
      background: var(--accent);
    }

    .flow-step h3 {
      font-size: 32px;
      color: var(--accent);
    }

    .flow-step p {
      margin-top: 18px;
      font-size: 27px;
      line-height: 1.38;
      color: var(--ink-muted);
    }

    .matrix {
      margin-top: 52px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 18px;
      max-width: 1450px;
    }

    .matrix .cell {
      border: 2px solid var(--line);
      min-height: 170px;
      padding: 24px;
      background: rgba(255, 255, 255, .25);
    }

    .matrix .cell h3 {
      font-size: 30px;
      color: var(--accent);
    }

    .matrix .cell p {
      margin-top: 14px;
      font-size: 25px;
      line-height: 1.34;
      color: var(--ink-muted);
    }

    .data-table {
      width: 1450px;
      margin-top: 34px;
      border-collapse: collapse;
      background: rgba(255, 255, 255, .24);
      border: 2px solid var(--line);
      table-layout: fixed;
    }

    .data-table th,
    .data-table td {
      border: 1px solid rgba(22, 19, 16, .14);
      padding: 12px 13px;
      vertical-align: top;
      text-align: left;
    }

    .data-table th {
      font-size: 21px;
      line-height: 1.2;
      color: var(--accent);
      font-weight: 800;
      background: rgba(141, 43, 47, .07);
    }

    .data-table td {
      font-size: 20px;
      line-height: 1.28;
      color: var(--ink-muted);
    }

    .data-table td:first-child {
      color: var(--accent);
      font-weight: 800;
      width: 150px;
    }

    .data-table.vram-table {
      margin-top: 24px;
      width: 1450px;
    }

    .data-table.vram-table th {
      font-size: 16px;
      padding: 7px 8px;
    }

    .data-table.vram-table td {
      font-size: 15px;
      line-height: 1.18;
      padding: 6px 8px;
    }

    .link-list {
      margin-top: 38px;
      max-width: 1280px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px 28px;
    }

    .link-item {
      border: 2px solid var(--line);
      background: rgba(255, 255, 255, .24);
      padding: 18px 22px;
      min-height: 98px;
    }

    .link-item strong {
      display: block;
      font-size: 28px;
      margin-bottom: 8px;
    }

    .link-item a {
      color: var(--ink-muted);
      font-size: 19px;
      line-height: 1.25;
      overflow-wrap: anywhere;
      text-decoration-color: rgba(141, 43, 47, .45);
    }

    .radar {
      margin-top: 54px;
      width: 1140px;
      height: 440px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 28px;
      align-items: end;
    }

    .bar {
      border-left: 2px solid var(--line);
      border-right: 2px solid var(--line);
      border-top: 8px solid var(--accent);
      background: linear-gradient(180deg, rgba(141, 43, 47, .18), rgba(255, 255, 255, .15));
      min-height: var(--bar-height);
      padding: 24px;
      display: flex;
      align-items: end;
      justify-content: center;
      text-align: center;
      font-size: 28px;
      line-height: 1.25;
      color: var(--ink);
    }

    .code-block {
      margin-top: 52px;
      max-width: 1180px;
      background: #221f1c;
      color: #f5eadc;
      padding: 38px 44px;
      font-size: 29px;
      line-height: 1.5;
      font-family: "Source Serif 4", "Noto Serif SC", serif;
      border-left: 10px solid var(--accent);
      white-space: pre-line;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      margin-top: 52px;
      max-width: 1260px;
    }

    .chip {
      border: 2px solid rgba(141, 43, 47, .34);
      padding: 18px 28px;
      border-radius: 999px;
      font-size: 28px;
      color: var(--accent);
      background: rgba(255, 255, 255, .24);
    }

    .workbench {
      margin-top: 54px;
      display: grid;
      grid-template-columns: 380px 380px 380px;
      gap: 30px;
      max-width: 1220px;
    }

    .workbench .card {
      min-height: 255px;
    }

    .media-frame {
      margin-top: 42px;
      max-width: 1180px;
      height: 500px;
      border: 2px solid var(--line);
      background: rgba(255, 255, 255, .30);
      padding: 18px;
      display: grid;
      place-items: center;
      box-shadow: 0 22px 56px rgba(40, 30, 20, .12);
    }

    .media-frame.wide {
      max-width: 1380px;
      height: 560px;
    }

    .media-frame.agent-flow-shot {
      max-width: 1180px;
      height: 410px;
      margin-top: 32px;
    }

    .media-frame.tall {
      max-width: 820px;
      height: 560px;
    }

    .media-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .image-grid {
      margin-top: 42px;
      max-width: 1450px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
    }

    .image-grid .media-frame {
      margin-top: 0;
      height: 430px;
      max-width: none;
      padding: 8px;
      box-shadow: none;
    }

    .image-pair {
      margin-top: 42px;
      max-width: 1370px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 26px;
      align-items: center;
    }

    .image-pair .media-frame {
      margin-top: 0;
      height: 430px;
      max-width: none;
    }

    .image-carousel {
      margin-top: 40px;
      max-width: 1390px;
      height: 570px;
      position: relative;
      border: 2px solid var(--line);
      background: rgba(255, 255, 255, .30);
      padding: 18px;
      overflow: hidden;
      box-shadow: 0 22px 56px rgba(40, 30, 20, .12);
    }

    .image-carousel img {
      position: absolute;
      inset: 18px;
      width: calc(100% - 36px);
      height: calc(100% - 36px);
      object-fit: contain;
      opacity: 0;
      animation: imageCycle 20s infinite;
    }

    .image-carousel img:nth-child(1) { animation-delay: 0s; }
    .image-carousel img:nth-child(2) { animation-delay: 2s; }
    .image-carousel img:nth-child(3) { animation-delay: 4s; }
    .image-carousel img:nth-child(4) { animation-delay: 6s; }
    .image-carousel img:nth-child(5) { animation-delay: 8s; }
    .image-carousel img:nth-child(6) { animation-delay: 10s; }
    .image-carousel img:nth-child(7) { animation-delay: 12s; }
    .image-carousel img:nth-child(8) { animation-delay: 14s; }
    .image-carousel img:nth-child(9) { animation-delay: 16s; }
    .image-carousel img:nth-child(10) { animation-delay: 18s; }

    @keyframes imageCycle {
      0%, 8% { opacity: 1; }
      12%, 100% { opacity: 0; }
    }

    .model-gallery {
      margin-top: 34px;
      max-width: 1450px;
      height: 680px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      cursor: pointer;
    }

    .model-gallery .media-frame {
      margin-top: 0;
      max-width: none;
      height: 680px;
      padding: 12px;
    }

    .model-gallery-hint {
      position: absolute;
      right: 175px;
      bottom: 112px;
      font-size: 22px;
      color: var(--ink-faint);
      letter-spacing: .08em;
    }

    @media (prefers-reduced-motion: reduce) {
      .image-carousel img:first-child {
        opacity: 1;
      }
    }

    .chapter-slide {
      background:
        radial-gradient(circle at 80% 20%, rgba(141, 43, 47, .12), transparent 30%),
        linear-gradient(90deg, rgba(22, 19, 16, .045) 0 1px, transparent 1px),
        var(--paper);
      background-size: auto, 44px 44px, auto;
    }

    .chapter-slide h2 {
      font-size: 104px;
      max-width: 1180px;
    }

    .chapter-index {
      position: absolute;
      right: 160px;
      bottom: 120px;
      font-size: 180px;
      font-family: "Cormorant Garamond", serif;
      color: rgba(141, 43, 47, .18);
      line-height: 1;
    }

    /* ===========================================
       TITLE SLIDE DETAILS
       标题页沿用已选择的第一种纸本文献感方向。
       =========================================== */
    .title-slide .side-note {
      position: absolute;
      right: 108px;
      top: 156px;
      writing-mode: vertical-rl;
      font-size: 26px;
      line-height: 1.8;
      color: var(--accent);
      letter-spacing: .12em;
    }

    .title-slide .stamp {
      position: absolute;
      right: 180px;
      bottom: 138px;
      width: 156px;
      height: 156px;
      border: 6px double var(--accent);
      display: grid;
      place-items: center;
      color: var(--accent);
      font-size: 32px;
      font-weight: 700;
      transform: rotate(-8deg);
      opacity: .88;
    }

    /* ===========================================
       REVEAL ANIMATIONS
       当前页出现时做轻微上移淡入，适合讲课节奏。
       =========================================== */
    .reveal {
      opacity: 0;
      transform: translateY(34px);
      transition:
        opacity var(--duration-normal) var(--ease-out-expo),
        transform var(--duration-normal) var(--ease-out-expo);
    }

    .visible .reveal {
      opacity: 1;
      transform: translateY(0);
    }

    .reveal:nth-child(1) { transition-delay: .08s; }
    .reveal:nth-child(2) { transition-delay: .16s; }
    .reveal:nth-child(3) { transition-delay: .24s; }
    .reveal:nth-child(4) { transition-delay: .32s; }
    .reveal:nth-child(5) { transition-delay: .40s; }

    /* ===========================================
       PRESENTATION CONTROLS
       控制条放在舞台之外，不影响 1920×1080 页面布局。
       =========================================== */
    .deck-controls {
      display: flex;

    /* ===========================================
       SLIDE HTML RENDERERS
       根据不同 layout 生成固定舞台内的 HTML 结构。
       =========================================== */
    const deckStage = document.getElementById("deckStage");

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[ch]));
    }

    function editable(text, tag = "p", className = "") {
      return `<${tag} class="${className} reveal" data-editable="true">${esc(text)}</${tag}>`;
    }

    function renderCards(items, layout = "") {
      const layoutClass = layout || (items.length === 3 ? "three" : "");
      return `<div class="cols ${esc(layoutClass)}">${items.map(([title, body]) => `
        <article class="card reveal">
          <h3 data-editable="true">${esc(title)}</h3>
          <p data-editable="true">${esc(body)}</p>
        </article>`).join("")}</div>`;
    }

    function renderBullets(items, small = false) {
      return `<ul class="bullets ${small ? "small-list" : ""}">${items.map(item => `
        <li class="reveal" data-editable="true">${esc(item)}</li>`).join("")}</ul>`;
    }

    function renderTimeline(items) {
      return `<div class="timeline">${items.map(([year, body]) => `
        <article class="time-item reveal">
          <div class="year" data-editable="true">${esc(year)}</div>
          <p data-editable="true">${esc(body)}</p>
        </article>`).join("")}</div>`;
    }

    function renderCompare(items) {
      return `<div class="compare">${items.map(([title, points]) => `
        <article class="compare-panel reveal">
          <h3 data-editable="true">${esc(title)}</h3>
          ${points.map(point => `<p data-editable="true">${esc(point)}</p>`).join("")}
        </article>`).join("")}</div>`;
    }

    function renderFlow(items) {
      return `<div class="flow">${items.map(([title, body]) => `
        <article class="flow-step reveal">
          <h3 data-editable="true">${esc(title)}</h3>
          <p data-editable="true">${esc(body)}</p>
        </article>`).join("")}</div>`;
    }

    function renderMatrix(items) {
      return `<div class="matrix">${items.map(([title, body]) => `
        <article class="cell reveal">
          <h3 data-editable="true">${esc(title)}</h3>
          <p data-editable="true">${esc(body)}</p>
        </article>`).join("")}</div>`;
    }

    function renderChips(items) {
      return `<div class="chips">${items.map(item => `
        <span class="chip reveal" data-editable="true">${esc(item)}</span>`).join("")}</div>`;
    }

    function renderRadar(items) {
      return `<div class="radar">${items.map(([label, height]) => `
        <div class="bar reveal" style="--bar-height: ${esc(height)}" data-editable="true">${esc(label)}</div>`).join("")}</div>`;
    }

    function renderTable(table) {
      return `<table class="data-table ${esc(table.variant || "")} reveal">
        <thead><tr>${table.headers.map(header => `<th data-editable="true">${esc(header)}</th>`).join("")}</tr></thead>
        <tbody>${table.rows.map(row => `<tr>${row.map(cell => `<td data-editable="true">${esc(cell)}</td>`).join("")}</tr>`).join("")}</tbody>
      </table>`;
    }

    function renderLinks(items) {
      return `<div class="link-list reveal">${items.map(item => `
        <div class="link-item">
          <strong data-editable="true">${esc(item.label)}</strong>
          <a href="${esc(item.url)}" target="_blank" rel="noreferrer">${esc(item.url)}</a>
        </div>`).join("")}</div>`;
    }

    function renderImage(image) {
      return `<figure class="media-frame ${esc(image.variant || "")} reveal">
        <img src="${esc(image.src)}" alt="${esc(image.alt || "")}">
      </figure>`;
    }

    function renderImageGrid(images) {
      return `<div class="image-grid reveal">${images.map(image => `
        <figure class="media-frame ${esc(image.variant || "")}">
          <img src="${esc(image.src)}" alt="${esc(image.alt || "")}">
        </figure>`).join("")}</div>`;
    }

    function renderImagePair(images) {
      return `<div class="image-pair reveal">${images.map(image => `
        <figure class="media-frame ${esc(image.variant || "")}">
          <img src="${esc(image.src)}" alt="${esc(image.alt || "")}">
        </figure>`).join("")}</div>`;
    }

    function renderCarousel(images) {
      return `<figure class="image-carousel reveal">${images.map(image => `
        <img src="${esc(image.src)}" alt="${esc(image.alt || "")}">`).join("")}</figure>`;
    }

    function renderModelGallery(images) {
      return `<div class="model-gallery reveal" data-model-gallery data-index="0">
        <figure class="media-frame"><img src="${esc(images[0].src)}" alt="${esc(images[0].alt || "")}"></figure>
        <figure class="media-frame"><img src="${esc(images[1].src)}" alt="${esc(images[1].alt || "")}"></figure>
        <div class="model-gallery-hint">点击切换下一组</div>
      </div>`;
    }

    function renderBody(slide) {
      let body = "";
      if (slide.lead) body += editable(slide.lead, "p", "lead");
      if (slide.subtitle) body += editable(slide.subtitle, "p", "subtitle");
      if (slide.bullets) body += renderBullets(slide.bullets, slide.bullets.length > 4);
      if (slide.cards) body += renderCards(slide.cards, slide.cardLayout);
      if (slide.timeline) body += renderTimeline(slide.timeline);
      if (slide.compare) body += renderCompare(slide.compare);
      if (slide.flow) body += renderFlow(slide.flow);
      if (slide.matrix) body += renderMatrix(slide.matrix);
      if (slide.chips) body += renderChips(slide.chips);
      if (slide.radar) body += renderRadar(slide.radar);
      if (slide.table) body += renderTable(slide.table);
      if (slide.links) body += renderLinks(slide.links);
      if (slide.code) body += `<pre class="code-block reveal" data-editable="true">${esc(slide.code)}</pre>`;
      if (slide.image) body += renderImage(slide.image);
      if (slide.imageGrid) body += renderImageGrid(slide.imageGrid);
      if (slide.imagePair) body += renderImagePair(slide.imagePair);
      if (slide.carousel) body += renderCarousel(slide.carousel);
      if (slide.modelGallery) body += renderModelGallery(slide.modelGallery);
      if (slide.quote) body += `<p class="big-quote reveal" data-editable="true">${esc(slide.quote)}</p>`;
      if (slide.caption) body += `<p class="caption reveal" data-editable="true" style="margin-top: 28px;">${esc(slide.caption)}</p>`;
      return body;
    }

    function renderSlide(slide, index) {
      const page = String(index + 1).padStart(2, "0");
      if (slide.type === "title") {
        return `<section class="slide title-slide" data-slide="${index}">
          <div class="section-mark">${esc(slide.section)}</div>
          <div class="page-no">${page} / ${slides.length}</div>
          <div class="side-note" data-editable="true">${esc(slide.note)}</div>
          <main class="slide-inner">
            ${editable(slide.kicker, "div", "kicker")}
            ${editable(slide.title, "h1", "")}
            ${editable(slide.subtitle, "p", "subtitle")}
          </main>
          <div class="stamp">AGENT</div>
        </section>`;
      }

      if (slide.type === "chapter") {
        return `<section class="slide chapter-slide" data-slide="${index}">
          <div class="section-mark">${esc(slide.section)}</div>
          <div class="page-no">${page} / ${slides.length}</div>
          <main class="slide-inner">
            ${editable(slide.title, "h2", "")}
            ${editable(slide.lead, "p", "lead")}
          </main>
          <div class="chapter-index">${esc(slide.index)}</div>
        </section>`;
      }

      return `<section class="slide" data-slide="${index}">
        <div class="section-mark">${esc(slide.section)}</div>
        <div class="page-no">${page} / ${slides.length}</div>
        <main class="slide-inner">
          ${editable(slide.title, "h2", "")}
          ${renderBody(slide)}
        </main>
      </section>`;
    }

    deckStage.innerHTML = slides.map(renderSlide).join("");

    /* ===========================================
       MODEL GALLERY INTERACTION
       模型能力图页采用两栏展示，点击图片区切换下一组。
       =========================================== */
    document.querySelectorAll("[data-model-gallery]").forEach((gallery) => {
      const slideIndex = Number(gallery.closest(".slide").dataset.slide);
      const images = slides[slideIndex].modelGallery || [];
      const imgEls = Array.from(gallery.querySelectorAll("img"));
      gallery.addEventListener("click", () => {
        const current = Number(gallery.dataset.index || "0");
        const next = (current + 2) % images.length;
        gallery.dataset.index = String(next);
        imgEls.forEach((img, i) => {
          const item = images[(next + i) % images.length];
          img.src = item.src;
          img.alt = item.alt || "";
        });
      });
    });

    /* ===========================================
       SLIDE PRESENTATION CONTROLLER
       支持键盘、触摸和鼠标滚轮切页，并保持固定 16:9 缩放。
       =========================================== */
    class SlidePresentation {
      constructor() {
        this.slides = Array.from(document.querySelectorAll(".slide"));
        this.currentSlide = 0;
        this.stage = document.getElementById("deckStage");
        this.pageLabel = document.getElementById("pageLabel");
        this.progressBar = document.getElementById("progressBar");
        this.lastWheelAt = 0;
        this.setupStageScale();
        this.setupKeyboardNav();
        this.setupTouchNav();
        this.setupWheelNav();
        this.setupButtons();
        this.showSlide(0);
      }

      setupStageScale() {
        const scale = () => {
          const factor = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
          const x = (window.innerWidth - 1920 * factor) / 2;
          const y = (window.innerHeight - 1080 * factor) / 2;
          this.stage.style.transform = `translate(${x}px, ${y}px) scale(${factor})`;
        };
        scale();
        window.addEventListener("resize", scale);
      }

      setupKeyboardNav() {
        document.addEventListener("keydown", (event) => {
          if (event.target && event.target.getAttribute("contenteditable") === "true") return;
          if (["ArrowRight", "PageDown", " "].includes(event.key)) {
            event.preventDefault();
            this.next();
          }
          if (["ArrowLeft", "PageUp"].includes(event.key)) {
            event.preventDefault();
            this.prev();
          }
          if (event.key === "Home") this.showSlide(0);
          if (event.key === "End") this.showSlide(this.slides.length - 1);
        });
      }

      setupTouchNav() {
        let startX = 0;
        let startY = 0;
        document.addEventListener("touchstart", (event) => {
          startX = event.changedTouches[0].clientX;
          startY = event.changedTouches[0].clientY;
        }, { passive: true });
        document.addEventListener("touchend", (event) => {
          const dx = event.changedTouches[0].clientX - startX;
          const dy = event.changedTouches[0].clientY - startY;
          if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
            dx < 0 ? this.next() : this.prev();
          }
        }, { passive: true });
      }

      setupWheelNav() {
        document.addEventListener("wheel", (event) => {
          const now = Date.now();
          if (now - this.lastWheelAt < 650 || Math.abs(event.deltaY) < 40) return;
          this.lastWheelAt = now;
          event.deltaY > 0 ? this.next() : this.prev();
        }, { passive: true });
      }

      setupButtons() {
        document.getElementById("prevBtn").addEventListener("click", () => this.prev());
        document.getElementById("nextBtn").addEventListener("click", () => this.next());
      }

      showSlide(index) {
        this.currentSlide = Math.max(0, Math.min(index, this.slides.length - 1));
        this.slides.forEach((slide, i) => {
          slide.classList.toggle("active", i === this.currentSlide);
          slide.classList.toggle("visible", i === this.currentSlide);
        });
        this.pageLabel.textContent = `${this.currentSlide + 1} / ${this.slides.length}`;
        this.progressBar.style.width = `${((this.currentSlide + 1) / this.slides.length) * 100}%`;
      }

      next() {
        this.showSlide(this.currentSlide + 1);
      }

      prev() {
        this.showSlide(this.currentSlide - 1);
      }
    }

    /* ===========================================
       INLINE EDITOR
       编辑模式会把可编辑文字保存到 localStorage，刷新后仍可保留。
       =========================================== */
    class InlineEditor {
      constructor() {
        this.isActive = false;
        this.key = "ai-agent-humanities-research-edits";
        this.editables = Array.from(document.querySelectorAll('[data-editable="true"]'));
        this.load();
        this.bindSave();
      }

      toggleEditMode() {
        this.isActive = !this.isActive;
        document.body.classList.toggle("editing", this.isActive);
        document.getElementById("editToggle").classList.toggle("active", this.isActive);
        this.editables.forEach((el) => {
          el.setAttribute("contenteditable", this.isActive ? "true" : "false");
        });
        if (!this.isActive) this.save();
      }

      bindSave() {
        this.editables.forEach((el) => {
          el.addEventListener("input", () => this.save());
        });
      }

      save() {
        const values = this.editables.map((el) => el.innerHTML);
        localStorage.setItem(this.key, JSON.stringify(values));
      }

      load() {
        try {
          const raw = localStorage.getItem(this.key);
          if (!raw) return;
          const values = JSON.parse(raw);
          this.editables.forEach((el, i) => {
            if (values[i]) el.innerHTML = values[i];
          });
        } catch {
          localStorage.removeItem(this.key);
        }
      }
    }

    const presentation = new SlidePresentation();
    const editor = new InlineEditor();

    /* ===========================================
       EDIT MODE ACCESS
       左上角热区、Edit 按钮和 E 键都可以切换编辑模式。
       =========================================== */
    const hotzone = document.querySelector(".edit-hotzone");
    const editToggle = document.getElementById("editToggle");
    let hideTimeout = null;

    hotzone.addEventListener("mouseenter", () => {
      clearTimeout(hideTimeout);
      editToggle.classList.add("show");
    });

    hotzone.addEventListener("mouseleave", () => {
      hideTimeout = setTimeout(() => {
        if (!editor.isActive) editToggle.classList.remove("show");
      }, 400);
    });

    editToggle.addEventListener("mouseenter", () => clearTimeout(hideTimeout));
    editToggle.addEventListener("mouseleave", () => {
      hideTimeout = setTimeout(() => {
        if (!editor.isActive) editToggle.classList.remove("show");
      }, 400);
    });

    hotzone.addEventListener("click", () => editor.toggleEditMode());
    editToggle.addEventListener("click", () => editor.toggleEditMode());

    document.addEventListener("keydown", (event) => {
      if ((event.key === "e" || event.key === "E") && event.target.getAttribute("contenteditable") !== "true") {
        editor.toggleEditMode();
      }
    });
  </script>
